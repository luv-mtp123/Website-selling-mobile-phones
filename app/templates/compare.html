{% extends 'base.html' %}

{% block content %}
<style>
    /* CSS CHUẨN CELLPHONES DÀNH RIÊNG CHO BẢNG SO SÁNH */
    .compare-container {
        background-color: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        padding: 30px;
    }
    .compare-header-title {
        font-weight: 800;
        text-transform: uppercase;
        color: #212529;
        margin-bottom: 25px;
        border-bottom: 3px solid #d70018;
        display: inline-block;
        padding-bottom: 8px;
    }

    /* Hiệu ứng Header bám dính khi cuộn (Sticky Header) */
    .compare-thead th {
        position: sticky !important;
        top: 65px; /* Chiều cao Navbar */
        background-color: #fff !important;
        z-index: 1020 !important;
        box-shadow: 0 4px 10px -2px rgba(0,0,0,0.1);
        padding: 20px 10px;
        border-bottom: 2px solid #dee2e6 !important;
    }

    /* Thiết kế riêng cho bảng do AI sinh ra */
    .table-compare {
        border-radius: 8px;
        overflow: hidden;
    }
    .table-compare tbody tr:hover {
        background-color: #f8f9fa;
    }
    .table-compare td {
        vertical-align: middle;
        padding: 15px;
    }
    /* Đổ màu cho hàng tiêu đề nhóm (Màn hình, Camera...) */
    .table-compare tr.table-light td {
        background-color: #f1f3f5 !important;
        color: #495057 !important;
        font-size: 1.1rem;
        border-top: 2px solid #dee2e6;
    }

    /* Thiết kế Form Chọn máy */
    .select-form-card {
        background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%);
        border: 1px solid #ffc9c9;
        border-radius: 15px;
        padding: 25px;
    }
    .vs-badge {
        background: #d70018;
        color: white;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
        margin: auto;
        box-shadow: 0 4px 8px rgba(215, 0, 24, 0.3);
    }
</style>

<div class="container mt-4 mb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted fw-bold"><i class="fas fa-home me-1"></i>Trang chủ</a></li>
            <li class="breadcrumb-item active text-dark fw-bold" aria-current="page">So sánh Điện thoại</li>
        </ol>
    </nav>

    <!-- Khu Vực Chọn Sản Phẩm Để So Sánh -->
    <div class="select-form-card mb-5 shadow-sm">
        <h4 class="fw-bold mb-4 text-center"><i class="fas fa-balance-scale text-danger me-2"></i>Chọn 2 Sản Phẩm Để So Sánh</h4>
        <form method="POST" action="/compare" class="row align-items-center">
            <div class="col-md-5 mb-3 mb-md-0">
                <label class="fw-bold mb-2 small text-muted">SẢN PHẨM THỨ 1</label>
                <select name="product1" class="form-select form-select-lg rounded-4 shadow-sm border-0" required>
                    <option value="" disabled selected>-- Chọn máy cần so sánh --</option>
                    {% for p in products %}
                        <option value="{{ p.id }}" {% if p1 and p1.id == p.id %}selected{% endif %}>{{ p.name }} - {{ p.price | vnd }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-2 text-center my-3 my-md-0">
                <div class="vs-badge">VS</div>
            </div>

            <div class="col-md-5">
                <label class="fw-bold mb-2 small text-muted">SẢN PHẨM THỨ 2</label>
                <select name="product2" class="form-select form-select-lg rounded-4 shadow-sm border-0" required>
                    <option value="" disabled selected>-- Chọn máy đối thủ --</option>
                    {% for p in products %}
                        <option value="{{ p.id }}" {% if p2 and p2.id == p.id %}selected{% endif %}>{{ p.name }} - {{ p.price | vnd }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 text-center mt-4">
                <button type="submit" class="btn btn-danger btn-lg rounded-pill px-5 fw-bold shadow">
                    <i class="fas fa-bolt me-2"></i>THỰC HIỆN SO SÁNH
                </button>
            </div>
        </form>
    </div>

    <!-- KHU VỰC HIỂN THỊ KẾT QUẢ TỪ AI -->
    {% if result %}
    <div class="compare-container">
        <h3 class="compare-header-title">Kết quả so sánh chi tiết</h3>

        <!-- Render trực tiếp HTML AI sinh ra tại đây -->
        <div class="table-responsive">
            {{ result | safe }}
        </div>

    </div>
    {% endif %}

</div>
{% endblock %}
